{% extends "base.html" %}
{% block content %}
<div class="card"><h2>Account</h2><p><strong>{{ user.display_name }}</strong> / {{ user.username }}</p>{% if error %}<div class="errors">{{ error }}</div>{% endif %}{% if message %}<p><strong>{{ message }}</strong></p>{% endif %}<form method="post" action="/account/password"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><p><label>Current Password</label><br><input name="current_password" type="password" required></p><p><label>New Password</label><br><input name="new_password" type="password" required></p><button type="submit">Change Password</button></form></div>
{% endblock %}
