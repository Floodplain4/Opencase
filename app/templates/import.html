{% extends "base.html" %}
{% block content %}
<div class="card"><h2>Import CSV</h2><p class="muted">This replaces the current cases table with the uploaded CSV data.</p>{% if message %}<p><strong>{{ message }}</strong></p>{% endif %}<form method="post" action="/import" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="file" name="file" accept=".csv" required><button type="submit">Import</button></form></div>
{% endblock %}
